<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hero Xtreme - Rider Guide Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --hero-red: #ff0033;
            --hero-yellow: #ffcc00; /* Rider Guide Brand Color */
            --hero-black: #050505;
            --panel-bg: #111;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--hero-black);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 15px;
            background: #111;
            border-bottom: 2px solid var(--hero-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand { font-family: 'Black Ops One'; color: var(--hero-red); font-size: 1.2rem; }
        .app-badge {
            background: var(--hero-yellow); color: #000;
            padding: 2px 8px; font-size: 0.6rem; font-weight: bold;
            border-radius: 3px; text-transform: uppercase;
        }

        /* Main Dashboard */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* Gauge */
        .gauge-container { position: relative; width: 280px; height: 280px; margin-bottom: 20px; }
        .gauge-svg { transform: rotate(135deg); width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: #333; stroke-width: 10; }
        .gauge-fill { 
            fill: none; stroke: var(--hero-red); stroke-width: 10; 
            stroke-dasharray: 580; stroke-dashoffset: 580;
            transition: stroke-dashoffset 0.2s; stroke-linecap: round;
        }
        .digital-display {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -40%); text-align: center;
        }
        .speed-val { font-size: 4rem; font-weight: 900; line-height: 1; }
        .unit { font-size: 0.9rem; color: #888; }

        /* Controls */
        .controls {
            display: flex; gap: 15px; margin-bottom: 30px;
        }
        .btn {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 12px 20px; border-radius: 5px; font-family: 'Orbitron';
            cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-hero {
            background: var(--hero-yellow); color: #000; border: none; font-weight: bold;
        }
        .btn-hero:active { transform: scale(0.95); }

        /* Stats Bar */
        .stats-bar {
            width: 100%; background: var(--panel-bg);
            display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid #333;
        }
        .stat-item { text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--hero-red); }
        .stat-label { font-size: 0.7rem; color: #666; text-transform: uppercase; }

    </style>
</head>
<body>

    <header>
        <div class="brand">HERO XTREME</div>
        <div class="app-badge">Rider Guide Sync</div>
    </header>

    <main>
        <div class="gauge-container">
            <svg class="gauge-svg" viewBox="0 0 240 240">
                <circle class="gauge-bg" cx="120" cy="120" r="100"></circle>
                <circle id="gauge-bar" class="gauge-fill" cx="120" cy="120" r="100"></circle>
            </svg>
            <div class="digital-display">
                <div id="speed" class="speed-val">0</div>
                <div class="unit">KM/H</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="toggleRide()" id="ride-btn">Start Ride</button>
            <!-- The Integration Button -->
            <button class="btn btn-hero" onclick="shareToHeroApp()">
                <span>Share to Hero App</span>
            </button>
        </div>
    </main>

    <div class="stats-bar">
        <div class="stat-item">
            <div id="dist" class="stat-val">0.0</div>
            <div class="stat-label">KM</div>
        </div>
        <div class="stat-item">
            <div id="time" class="stat-val">00:00</div>
            <div class="stat-label">TIME</div>
        </div>
        <div class="stat-item">
            <div id="max" class="stat-val">0</div>
            <div class="stat-label">MAX SPD</div>
        </div>
    </div>

    <script>
        /* --- STATE --- */
        let isRiding = false;
        let watchId = null;
        let startTime = 0;
        let totalDist = 0;
        let maxSpeed = 0;
        let timerInterval = null;

        /* --- GPS LOGIC --- */
        function toggleRide() {
            const btn = document.getElementById('ride-btn');
            
            if (!isRiding) {
                // Start
                isRiding = true;
                startTime = Date.now();
                totalDist = 0;
                maxSpeed = 0;
                btn.innerText = "End Ride";
                btn.style.borderColor = "var(--hero-red)";
                btn.style.color = "var(--hero-red)";

                // Start GPS
                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(handleGPS, null, {
                        enableHighAccuracy: true
                    });
                }
                // Start Timer
                timerInterval = setInterval(updateTimer, 1000);

            } else {
                // Stop
                isRiding = false;
                navigator.geolocation.clearWatch(watchId);
                clearInterval(timerInterval);
                btn.innerText = "Start Ride";
                btn.style.borderColor = "#444";
                btn.style.color = "#fff";
                
                // Prompt user to share immediately after ride ends
                setTimeout(() => {
                    shareToHeroApp();
                }, 500);
            }
        }

        function handleGPS(position) {
            const speed = position.coords.speed || 0; // m/s
            const speedKmh = speed * 3.6; // Convert to km/h

            // Update UI
            document.getElementById('speed').innerText = Math.floor(speedKmh);
            
            // Gauge Arc (Max 140)
            const percent = Math.min(speedKmh / 140, 1);
            const offset = 580 - (580 * percent);
            document.getElementById('gauge-bar').style.strokeDashoffset = offset;

            // Stats (Simplified logic for demo)
            if (speedKmh > maxSpeed) maxSpeed = speedKmh;
            document.getElementById('max').innerText = Math.floor(maxSpeed);

            // Note: Real distance calculation requires haversine formula on position changes
            // For this demo, we increment distance slightly if moving
            if (speedKmh > 5) {
                totalDist += (speedKmh / 3600) * 10; // Approx update every 10s logic
                document.getElementById('dist').innerText = totalDist.toFixed(1);
            }
        }

        function updateTimer() {
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('time').innerText = `${m}:${s}`;
        }

        /* --- HERO RIDER GUIDE INTEGRATION --- */
        function shareToHeroApp() {
            if (totalDist === 0) {
                alert("No ride data to share!");
                return;
            }

            // 1. Format the message
            const shareData = {
                title: 'My Xtreme Ride',
                text: `Just finished a ride on my Hero Xtreme! \n🏍️ Distance: ${totalDist.toFixed(1)} km\n⏱️ Time: ${document.getElementById('time').innerText}\n🚀 Max Speed: ${Math.floor(maxSpeed)} km/h\n\nShared via Custom System`,
                url: window.location.href // Link back to this web app
            };

            // 2. Check if Web Share API is supported
            if (navigator.share) {
                navigator.share(shareData)
                    .then(() => console.log('Successful share'))
                    .catch((error) => console.log('Error sharing', error));
            } else {
                // Fallback for older browsers/desktop
                alert("Sharing not supported on this browser. Use Chrome on Mobile.");
            }
        }
    </script>
</body>
</html>
