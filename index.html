<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hero Xtreme 125R - Pro System</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS STYLES --- */
        :root {
            --hero-red: #ff0033;
            --hero-blue: #00ccff;
            --bg-dark: #050505;
            --panel-bg: #111;
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 15px;
            background: #111;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--hero-red);
        }
        .brand { font-family: 'Black Ops One'; color: var(--hero-red); font-size: 1.2rem; }
        
        /* Main Dashboard */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Gauge */
        .gauge-container { position: relative; width: 280px; height: 280px; }
        .gauge-svg { transform: rotate(135deg); width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: #333; stroke-width: 10; }
        .gauge-fill { 
            fill: none; stroke: var(--hero-red); stroke-width: 10; 
            stroke-dasharray: 580; stroke-dashoffset: 580;
            transition: stroke-dashoffset 0.2s;
            stroke-linecap: round;
        }
        
        .digital-display {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -40%);
            text-align: center;
        }
        .speed-val { font-size: 4rem; font-weight: 900; line-height: 1; text-shadow: 0 0 10px rgba(255,0,51,0.5); }
        .unit { font-size: 1rem; color: #888; }

        /* Controls */
        .controls {
            display: flex; gap: 10px; margin-top: 20px;
        }
        .btn {
            background: #222; border: 1px solid #444; color: white;
            padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer;
            border-radius: 4px; text-transform: uppercase; font-size: 0.8rem;
        }
        .btn:hover { background: #333; }
        .btn.active { background: var(--hero-blue); color: #000; border-color: var(--hero-blue); }
        .btn-danger { border-color: var(--hero-red); color: var(--hero-red); }
        
        /* History Panel (Backend Data) */
        #history-panel {
            background: var(--panel-bg);
            padding: 15px;
            border-top: 1px solid #333;
            max-height: 200px;
            overflow-y: auto;
        }
        .history-title { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; }
        .ride-log {
            display: flex; justify-content: space-between;
            font-size: 0.8rem; padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        .ride-log span:first-child { color: var(--hero-red); }

        /* Status Toast */
        #toast {
            position: absolute; bottom: 220px;
            background: rgba(0,0,0,0.8); color: #fff;
            padding: 10px 20px; border-radius: 5px;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none; border: 1px solid var(--hero-blue);
        }

    </style>
</head>
<body>

    <header>
        <div class="brand">XTREME SYS</div>
        <div style="font-size:0.8rem; color:#666;">v2.0 PRO</div>
    </header>

    <main>
        <div class="gauge-container">
            <svg class="gauge-svg" viewBox="0 0 240 240">
                <circle class="gauge-bg" cx="120" cy="120" r="100"></circle>
                <circle id="gauge-bar" class="gauge-fill" cx="120" cy="120" r="100"></circle>
            </svg>
            <div class="digital-display">
                <div id="speed" class="speed-val">0</div>
                <div class="unit">KM/H</div>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn" onclick="startTracking()">Start Ride</button>
            <button id="stop-btn" class="btn btn-danger" onclick="stopTracking()" disabled>End & Save</button>
            <button id="bt-btn" class="btn" onclick="toggleBluetooth()">BT OFF</button>
        </div>

        <div id="toast">Connecting to Backend...</div>
    </main>

    <!-- Backend Data Display -->
    <div id="history-panel">
        <div class="history-title">RIDE HISTORY (From Backend)</div>
        <div id="history-list">Loading...</div>
    </div>

    <script>
        /* --- FRONTEND LOGIC --- */
        
        // Configuration
        const API_URL = 'http://localhost:3000/api'; // Change this if hosting online
        
        // State
        let isTracking = false;
        let isBluetoothMode = false;
        let watchId = null;
        let startTime = 0;
        let maxSpeed = 0;
        let totalDist = 0;
        
        // GPS Vars
        let lastPos = null;
        let lastTime = 0;

        // Elements
        const speedEl = document.getElementById('speed');
        const gaugeBar = document.getElementById('gauge-bar');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const btBtn = document.getElementById('bt-btn');
        const historyList = document.getElementById('history-list');
        const toast = document.getElementById('toast');

        // --- INITIALIZATION ---
        window.onload = () => {
            fetchHistory(); // Load data from backend on start
        };

        // --- GPS FUNCTIONS ---
        function startTracking() {
            if (!navigator.geolocation) {
                showToast("GPS not supported");
                return;
            }

            isTracking = true;
            startTime = Date.now();
            maxSpeed = 0;
            totalDist = 0;
            lastPos = null;
            
            // UI Updates
            startBtn.disabled = true;
            stopBtn.disabled = false;
            startBtn.classList.add('active');

            watchId = navigator.geolocation.watchPosition(updatePosition, gpsError, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000
            });
            
            showToast("Ride Started");
        }

        function stopTracking() {
            if (!isTracking) return;
            isTracking = false;

            navigator.geolocation.clearWatch(watchId);
            
            // UI Updates
            startBtn.disabled = false;
            stopBtn.disabled = true;
            startBtn.classList.remove('active');

            // Send Data to Backend
            saveRideToBackend();
        }

        function updatePosition(position) {
            const now = Date.now();
            
            if (lastPos) {
                // Calculate Distance & Speed
                const dLat = (position.coords.latitude - lastPos.latitude) * (Math.PI/180);
                const dLon = (position.coords.longitude - lastPos.longitude) * (Math.PI/180);
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(lastPos.latitude * (Math.PI/180)) * Math.cos(position.coords.latitude * (Math.PI/180)) * 
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distKm = 6371 * c;
                const timeHours = (now - lastTime) / 3600000;

                let speed = 0;
                if (timeHours > 0) {
                    speed = distKm / timeHours;
                }

                // Update State
                totalDist += distKm;
                if (speed > maxSpeed) maxSpeed = speed;

                // Update Dashboard
                updateDashboard(speed);
            }

            lastPos = position;
            lastTime = now;
        }

        function updateDashboard(speed) {
            // Update Text
            speedEl.innerText = Math.floor(speed);

            // Update Arc (Max 140kmh)
            const maxScale = 140;
            let percent = speed / maxScale;
            if (percent > 1) percent = 1;
            const offset = 580 - (580 * percent);
            gaugeBar.style.strokeDashoffset = offset;
        }

        function gpsError() {
            showToast("GPS Signal Lost");
        }

        // --- BACKEND INTEGRATION ---
        async function saveRideToBackend() {
            const duration = Date.now() - startTime;
            const rideData = {
                date: new Date().toISOString(),
                distance: parseFloat(totalDist.toFixed(2)),
                maxSpeed: Math.floor(maxSpeed),
                duration: duration // in milliseconds
            };

            try {
                const response = await fetch(`${API_URL}/rides`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(rideData)
                });
                
                if (response.ok) {
                    showToast("Ride Saved to Server!");
                    fetchHistory(); // Refresh list
                } else {
                    showToast("Error saving ride");
                }
            } catch (error) {
                console.error(error);
                showToast("Server Connection Failed");
            }
        }

        async function fetchHistory() {
            try {
                const response = await fetch(`${API_URL}/rides`);
                const data = await response.json();
                
                historyList.innerHTML = '';
                if (data.length === 0) {
                    historyList.innerHTML = '<div style="color:#555; text-align:center;">No rides recorded yet.</div>';
                    return;
                }

                // Show last 5 rides
                data.slice(-5).reverse().forEach(ride => {
                    const dateObj = new Date(ride.date);
                    const dateStr = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    const div = document.createElement('div');
                    div.className = 'ride-log';
                    div.innerHTML = `
                        <span>${ride.distance} km</span>
                        <span>${ride.maxSpeed} km/h</span>
                        <span style="color:#888; font-size:0.7rem;">${dateStr}</span>
                    `;
                    historyList.appendChild(div);
                });

            } catch (error) {
                historyList.innerHTML = '<div style="color:red;">Failed to connect to Backend.</div>';
            }
        }

        // --- UTILS ---
        function toggleBluetooth() {
            isBluetoothMode = !isBluetoothMode;
            if (isBluetoothMode) {
                btBtn.classList.add('active');
                btBtn.innerText = "BT ON";
                showToast("Bluetooth Voice Active");
            } else {
                btBtn.classList.remove('active');
                btBtn.innerText = "BT OFF";
            }
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.opacity = 1;
            setTimeout(() => { toast.style.opacity = 0; }, 3000);
        }

    </script>
</body>
</html>
